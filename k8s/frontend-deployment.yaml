apiVersion: apps/v1
kind: Deployment
metadata:
  name: tienda-frontend
  namespace: tienda
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tienda-frontend
  template:
    metadata:
      labels:
        app: tienda-frontend
    spec:
      containers:
        - name: frontend
          image: 334987711617.dkr.ecr.us-east-1.amazonaws.com/tienda-frontend:eks-v1
          ports:
            - containerPort: 80
          # Recursos necesarios para que el HPA funcione (Actividad 4)
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"